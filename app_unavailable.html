<style>
  :root { --app-color: #a855f7; }

  .unavail-wrap {
    min-height: calc(100dvh - 56px - 80px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }

  .unavail-card {
    max-width: 520px;
    width: 100%;
    background: var(--glass-bg, rgba(20,20,30,0.6));
    border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
    border-radius: 28px;
    padding: 52px 44px;
    text-align: center;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 32px 80px rgba(0,0,0,0.45);
    animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes cardIn {
    from { opacity:0; transform: translateY(24px) scale(0.96); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  .unavail-icon {
    width: 80px; height: 80px;
    margin: 0 auto 28px;
    border-radius: 22px;
    background: linear-gradient(135deg, #a855f7, #5e5ce6);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    box-shadow: 0 12px 32px rgba(168,85,247,0.35);
    animation: iconPulse 2.5s ease-in-out infinite;
  }

  @keyframes iconPulse {
    0%, 100% { box-shadow: 0 12px 32px rgba(168,85,247,0.35); }
    50%       { box-shadow: 0 12px 48px rgba(168,85,247,0.55); }
  }

  .unavail-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,149,0,0.12);
    border: 1px solid rgba(255,149,0,0.3);
    color: #ff9500;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 20px;
    padding: 5px 14px;
    margin-bottom: 22px;
    --badge-dot-color: #ff9500;
  }

  .unavail-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--badge-dot-color, #ff9500);
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  .unavail-title {
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.25;
    color: var(--text-main, #f5f5f7);
    margin-bottom: 14px;
  }

  .unavail-desc {
    font-size: 0.98rem;
    color: var(--text-muted, rgba(255,255,255,0.5));
    line-height: 1.75;
    word-break: keep-all;
    margin-bottom: 36px;
  }

  .unavail-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #a855f7, #5e5ce6);
    color: #fff;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 14px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 8px 24px rgba(168,85,247,0.35);
  }

  .unavail-btn:hover {
    opacity: 0.9;
    transform: translateY(-2px);
  }

  .unavail-divider {
    width: 40px;
    height: 2px;
    background: var(--glass-border, rgba(255,255,255,0.1));
    margin: 36px auto;
    border-radius: 2px;
  }

  .unavail-other-title {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted, rgba(255,255,255,0.4));
    margin-bottom: 18px;
  }

  .unavail-other-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .unavail-other-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--glass-bg, rgba(255,255,255,0.05));
    border: 1px solid var(--glass-border, rgba(255,255,255,0.08));
    border-radius: 12px;
    padding: 9px 14px;
    text-decoration: none;
    color: var(--text-main, #f5f5f7);
    font-size: 0.85rem;
    font-weight: 600;
    transition: background 0.18s, border-color 0.18s, transform 0.18s;
  }

  .unavail-other-item:hover {
    background: rgba(168,85,247,0.1);
    border-color: rgba(168,85,247,0.3);
    transform: translateY(-2px);
  }

  .unavail-other-dot {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
</style>
</head>

<script>window.LAYOUT_ROOT = './';</script>

<script src="landing-common.js"></script>
<script>
(function () {
  // URL 파라미터에서 앱 키/이름 읽기
  var params = new URLSearchParams(location.search);
  var appKey  = params.get('app')  || '';
  var appName = params.get('name') || '';

  var APP_META = {
    tangram : { label: 'Tangram',        emoji: '🧩', grad: 'linear-gradient(135deg,#ff8c5a,#ff6b35)', landing: 'apps/tangram/landing.html' },
    pachinko: { label: 'Pachinko',       emoji: '🎰', grad: 'linear-gradient(135deg,#ff5274,#d81b60)', landing: 'apps/pachinko/landing.html' },
    server  : { label: 'Server Monitor', emoji: '🖥️', grad: 'linear-gradient(135deg,#34d399,#10b981)', landing: 'apps/server/landing.html'   },
    sys     : { label: 'System Info',    emoji: '⚙️', grad: 'linear-gradient(135deg,#8b89ff,#5e5ce6)', landing: 'index.html?app=sys'         },
    pdf     : { label: 'PDF Splitter',   emoji: '📄', grad: 'linear-gradient(135deg,#ff6b63,#ff3b30)', landing: 'apps/pdf/landing.html'      },
    qr      : { label: 'QR Master',      emoji: '🔗', grad: 'linear-gradient(135deg,#40b3ff,#007aff)', landing: 'apps/qr/landing.html'       },
    meter   : { label: 'Clap Meter',     emoji: '👏', grad: 'linear-gradient(135deg,#ffcc00,#ff9500)', landing: 'apps/meter/landing.html'    },
    spell   : { label: 'Spell Check',    emoji: '✍️', grad: 'linear-gradient(135deg,#c4b5fd,#8b5cf6)', landing: 'apps/spell/landing.html'    },
  };

  // 이 페이지로 온 앱 정보를 제목에 반영
  if (appKey && APP_META[appKey]) {
    // 정상 케이스: 알려진 앱이 OFF 상태
    var meta = APP_META[appKey];
    var label = appName || meta.label;
    document.getElementById('unavailIcon').textContent  = meta.emoji;
    document.getElementById('unavailTitle').textContent = label + ' — 현재 준비 중입니다';
    document.title = label + ' — 서비스 준비 중 | Vibe Studio';
  } else if (!appKey || !APP_META[appKey]) {
    // 비정상 케이스: 파라미터 없거나 알 수 없는 앱 키 → 잘못된 접근 안내
    document.getElementById('unavailIcon').textContent  = '🔍';
    document.getElementById('unavailBadge').textContent = '잘못된 접근';
    document.getElementById('unavailBadge').style.background  = 'rgba(99,102,241,0.12)';
    document.getElementById('unavailBadge').style.borderColor = 'rgba(99,102,241,0.3)';
    document.getElementById('unavailBadge').style.color       = '#818cf8';
    document.getElementById('unavailBadge').style.setProperty('--badge-dot-color', '#818cf8');
    document.getElementById('unavailTitle').textContent = '페이지를 찾을 수 없습니다';
    document.getElementById('unavailDesc').innerHTML =
      '요청하신 주소가 존재하지 않거나,<br>앱 링크가 올바르지 않습니다.<br>' +
      'Vibe Studio 홈에서 원하는 앱을 찾아보세요. 🏠';
    document.title = '잘못된 접근 | Vibe Studio';
  }

  // 활성화된 다른 앱 목록을 API에서 가져와 렌더링
  async function renderOtherApps() {
    var grid = document.getElementById('otherAppsGrid');
    try {
      var res  = await fetch('admin.php?action=app_settings_get', { cache: 'no-store' });
      var data = await res.json();
      if (!data.success || !data.settings) { grid.innerHTML = ''; return; }

      var items = data.settings.filter(function(s) {
        return parseInt(s.enabled) === 1 && s.app_key !== appKey;
      });

      if (items.length === 0) {
        grid.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">현재 이용 가능한 앱이 없습니다.</div>';
        return;
      }

      grid.innerHTML = items.map(function(s) {
        var m = APP_META[s.app_key];
        if (!m) return '';
        return '<a class="unavail-other-item" href="' + m.landing + '">'
          + '<div class="unavail-other-dot" style="background:' + m.grad + '">' + m.emoji + '</div>'
          + m.label
          + '</a>';
      }).join('');
    } catch (e) {
      grid.innerHTML = '';
    }
  }

  renderOtherApps();
})();
</script>
