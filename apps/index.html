<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Studio ⚡ | macOS Edition</title>

    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23a855f7'/%3E%3Cstop offset='100%25' stop-color='%235e5ce6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='25' fill='url(%23g)'/%3E%3Ctext x='50' y='74' font-size='65' font-family='-apple-system, sans-serif' font-weight='900' fill='white' text-anchor='middle'%3EV%3C/text%3E%3C/svg%3E">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        /* 1. macOS 글로벌 테마 변수 (Glassmorphism) */
        :root {
            --bg-main: #F5F5F7;
            --mac-wallpaper: linear-gradient(135deg, #f5f5f7 0%, #e2e2e7 100%);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --menu-bg: rgba(255, 255, 255, 0.4);
            --dock-bg: rgba(255, 255, 255, 0.45);
            --content-bg: rgba(255, 255, 255, 0.6);
            --input-bg: rgba(255, 255, 255, 0.9);
            --input-border: rgba(0, 0, 0, 0.1);
            --sys-primary: #6D28D9;
            --server-primary: #10b981;
            --spell-primary: #8b5cf6;
            --pdf-primary: #ff3b30;
            --qr-primary: #007aff;
            --tangram-primary: #ff6b35;
            --meter-primary: #ff9500;
            --pachinko-primary: #ff2d55;
            --meter-canvas-bg: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-main: #050507;
            --mac-wallpaper: #020202;
            --glass-bg: rgba(30, 30, 32, 0.75);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
            --menu-bg: rgba(0, 0, 0, 0.4);
            --dock-bg: rgba(0, 0, 0, 0.45);
            --content-bg: rgba(0, 0, 0, 0.3);
            --input-bg: rgba(0, 0, 0, 0.5);
            --input-border: rgba(255, 255, 255, 0.1);
            --sys-primary: #5e5ce6;
            --server-primary: #34d399;
            --spell-primary: #a78bfa;
            --pdf-primary: #ff453a;
            --qr-primary: #0a84ff;
            --tangram-primary: #ff8c5a;
            --meter-primary: #ff9f0a;
            --pachinko-primary: #ff375f;
            --meter-canvas-bg: rgba(0, 0, 0, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        #vibe-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: var(--mac-wallpaper);
        }

        .mesh-ball {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite alternate;
        }

        [data-theme="dark"] .mesh-gradient { background: #000 !important; }
        [data-theme="dark"] .mesh-ball { opacity: 0.15; filter: blur(100px); }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 100px) scale(1.2); }
        }

        .desktop-branding {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            user-select: none;
            pointer-events: none;
        }

        .desktop-branding.dimmed {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.85);
            filter: blur(25px);
        }

        .brand-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: floatBranding 8s ease-in-out infinite;
            margin-bottom: 30px;
        }

        .css-logo-box {
            width: clamp(100px, 18vw, 150px);
            height: clamp(100px, 18vw, 150px);
            margin-bottom: 30px;
            border-radius: 28%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 50%, #d946ef 100%);
            background-size: 200% 200%;
            animation: gradientFlow 4s ease infinite;
            box-shadow: 0 25px 60px rgba(139, 92, 246, 0.5), inset 0 2px 8px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .lightning-svg {
            width: 58%;
            height: 58%;
            fill: #ffffff;
            animation: pulseLightning 2s ease-in-out infinite alternate;
        }

        @keyframes pulseLightning {
            0% { transform: scale(0.92); filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4)); }
            100% { transform: scale(1.15); filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.9)); }
        }

        .branding-title {
            font-weight: 900;
            font-size: clamp(3rem, 8vw, 6.5rem);
            letter-spacing: -0.06em;
            line-height: 0.9;
            color: var(--text-main);
            text-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            margin: 0;
        }

        @keyframes floatBranding {
            0%, 100% { transform: translateY(0px) rotate(-1deg); }
            50% { transform: translateY(-25px) rotate(1deg); }
        }

        .typing-container {
            font-family: ui-monospace, monospace;
            font-size: clamp(1.1rem, 2.2vw, 1.4rem);
            color: var(--sys-primary);
            min-height: 50px;
            font-weight: 600;
            margin-top: 25px;
            opacity: 0.75;
        }

        [data-theme="dark"] .typing-container { color: #E9D5FF; }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.1em;
            background-color: currentColor;
            margin-left: 8px;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            border-radius: 2px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* macOS UI Elements */
        .mac-menu-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: var(--menu-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 13px;
            z-index: 10000;
            border-bottom: 1px solid var(--glass-border);
            box-sizing: border-box;
            color: var(--text-main);
        }

        .mac-menu-left, .mac-menu-right { display: flex; align-items: center; gap: 8px; }
        .mac-menu-left b { display: flex; align-items: center; gap: 5px; font-weight: 800; }

        .mac-window {
            width: 90%;
            max-width: 850px;
            height: 80vh;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-top: -30px;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }

        .mac-window.hidden {
            display: none !important;
            opacity: 0;
            transform: scale(0.95) translateY(20px);
        }

        .mac-titlebar {
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--glass-border);
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .traffic-lights { 
            position: absolute; 
            left: 15px; 
            top: 50%;
            transform: translateY(-50%);
            display: flex; 
            gap: 8px; 
        }
        .light { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: transform 0.1s; }
        .light:hover { transform: scale(1.1); }
        .light.red { background: #ff5f56; border: 1px solid #e0443e; }
        .light.yellow { background: #ffbd2e; border: 1px solid #dea123; }



        .window-title { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 8px;
            color: var(--text-main);
            font-weight: 700;
            font-size: 15px;
            /* Ensure the title itself is centered in the 52px header */
        }
        .window-title i {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
        }
        .window-title i svg {
            width: 18px !important;
            height: 18px !important;
        }
        .window-title span {
            line-height: 1.2;
            display: inline-block;
        }

        .mac-content-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            box-sizing: border-box;
        }

        .app-view { display: none; animation: fadeEffect 0.3s; }
        .app-view.active { display: block; }
        @keyframes fadeEffect { from { opacity: 0; } to { opacity: 1; } }

        /* App Content Headers */
        .mobile-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: clamp(20px, 4vw, 24px);
            font-weight: 800;
            margin-bottom: 25px;
            line-height: 1;
        }
        .mobile-header i {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 28px;
            height: 28px;
        }
        .mobile-header i svg {
            width: 100% !important;
            height: 100% !important;
        }

        .mac-dock {
            position: fixed;
            bottom: 20px;
            background: var(--dock-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 10px 15px;
            display: flex;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .theme-toggle {
            background: transparent;
            border: none;
            width: 16px;
            height: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.2s ease;
            padding: 0;
            opacity: 0.6;
            margin: 0 1px;
        }

        .theme-toggle:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .theme-toggle i {
            width: 9px;
            height: 9px;
            stroke-width: 1.2;
        }

        [data-theme="light"] .theme-toggle, 
        :root:not([data-theme="dark"]) .theme-toggle {
            background: transparent;
        }

        .dock-item {
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .dock-icon {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dock-icon i { color: white; width: 30px; height: 30px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }

        .dock-tooltip {
            position: absolute;
            top: -45px;
            background: var(--dock-bg);
            backdrop-filter: blur(15px);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s;
            white-space: nowrap;
            transform: translateY(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @media (hover: hover) {
            .dock-item:hover { transform: scale(1.2) translateY(-10px); }
            .dock-item:hover .dock-tooltip { opacity: 1; transform: translateY(0); }
        }

        .dock-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-main);
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .dock-item.active .dock-dot { opacity: 1; }

        /* 📱 반응형 (Mobile 모드) */

        @media (max-width: 768px) {
            body { align-items: flex-start; }
            .mac-window {
                width: 100% !important;
                max-width: 100% !important;
                height: calc(100dvh - 30px) !important;
                margin-top: 0;
                border: none;
                border-top: 1px solid var(--glass-border);
                border-radius: 0; 
                padding-bottom: 110px;
                box-sizing: border-box;
                z-index: 1500;
                top: 30px !important;
                bottom: 0px !important;
                position: fixed !important;
                transform: translateY(0);
                opacity: 1;
            }
            .mac-window.hidden { display: none !important; transform: translateY(100%); }
            .mac-titlebar { 
                display: flex !important; 
                height: 52px; 
                border-radius: 0; 
                background: var(--glass-bg);
            }
            .mac-menu-bar { padding: 0 10px; }
            .mac-menu-right { gap: 6px; }
            #mac-clock { font-size: 12px; letter-spacing: -0.2px; }
            .mac-content-area { padding: 15px; }
            .mac-dock {
                width: 100% !important;
                bottom: 0 !important;
                left: 0 !important;
                border-radius: 0;
                padding: 15px 15px 40px 15px;
                overflow-x: auto;
                justify-content: flex-start;
                z-index: 2000;
            }
            .dock-icon { width: 50px; height: 50px; }
            .dock-tooltip { display: none !important; }
            .dock-item::after {
                content: attr(data-label);
                font-size: 11px;
                color: var(--text-main);
                margin-top: 6px;
                opacity: 0.7;
                white-space: nowrap;
            }
            .dock-item.active::after { opacity: 1; font-weight: 700; }
        }

        /* 공통 컴포넌트 */
        .mac-input {
            width: 100%;
            padding: 14px 15px;
            margin-bottom: 15px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-main);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
        }
        .mac-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .mac-btn:active { transform: scale(0.97); }
    </style>
</head>

<body>
    <canvas id="vibe-canvas"></canvas>
    <div class="mesh-gradient" id="meshBg">
        <div class="mesh-ball" style="width: 600px; height: 600px; background: #a855f7; top: -10%; left: -10%;"></div>
        <div class="mesh-ball" style="width: 500px; height: 500px; background: #5e5ce6; bottom: -20%; right: -10%;"></div>
    </div>

    <div class="desktop-branding" id="desktopBranding">
        <div class="brand-group">
            <div class="css-logo-box">
                <svg class="lightning-svg" viewBox="0 0 24 24"><path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="#fff" /></svg>
            </div>
            <h1 class="branding-title">Vibe Studio</h1>
        </div>
        <div class="typing-container" id="type-box">
            <span id="prompt-text"></span><span class="cursor"></span>
        </div>
    </div>

    <div class="mac-menu-bar">
        <div class="mac-menu-left"><b><i data-lucide="zap" style="width:14px;"></i> Vibe Studio</b></div>
        <div class="mac-menu-right">
            <button class="theme-toggle" onclick="toggleGlobalTheme()"><i data-lucide="sun" id="globalThemeIcon"></i></button>
            <button class="theme-toggle" onclick="openAdmin()" style="margin-left:5px;"><i data-lucide="settings"></i></button>
            <span id="mac-clock"></span>
        </div>
    </div>

    <div class="mac-window hidden" id="macWindow">
        <div class="mac-titlebar">
            <div class="traffic-lights">
                <div class="light red" onclick="closeWindow()"></div>
            </div>
            <div class="window-title" id="windowTitle">
                <i data-lucide="zap" id="windowIcon" style="width:16px;"></i> <span id="windowTitleText">Vibe Studio</span>
            </div>
        </div>
        <div class="mac-content-area">
            <div id="app-tangram" class="app-view"></div>
            <div id="app-pachinko" class="app-view"></div>
            <div id="app-server" class="app-view"></div>
            <div id="app-sys" class="app-view"></div>
            <div id="app-admin" class="app-view"></div>
            <div id="app-pdf" class="app-view"></div>
            <div id="app-qr" class="app-view"></div>
            <div id="app-spell" class="app-view"></div>
            <div id="app-meter" class="app-view"></div>
        </div>
    </div>

    <div id="app-floating"></div>

    <div class="mac-dock">
        <button class="dock-item" data-label="Tangram" onclick="switchApp('tangram', 'Tangram', '#ff6b35', 'puzzle')">
            <div class="dock-icon" style="background: linear-gradient(180deg, #ff8c5a, #ff6b35);"><i data-lucide="puzzle"></i></div>
            <div class="dock-dot"></div>
        </button>
        <button class="dock-item" data-label="Pachinko" onclick="switchApp('pachinko', 'Pachinko v5.1', '#ff2d55', 'gamepad-2')">
            <div class="dock-icon" style="background: linear-gradient(180deg, #ff2d55, #d81b60);"><i data-lucide="gamepad-2"></i></div>
            <div class="dock-dot"></div>
        </button>
        <button class="dock-item" data-label="서버 모니터" onclick="switchApp('server', 'Server Monitor', '#34d399', 'server')">
            <div class="dock-icon" style="background: linear-gradient(180deg, #34d399, #10b981);"><i data-lucide="server"></i></div>
            <div class="dock-dot"></div>
        </button>
        <button class="dock-item" data-label="환경 진단" onclick="switchApp('sys', 'System Info', '#7b78ff', 'activity')">
            <div class="dock-icon" style="background: linear-gradient(180deg, #7b78ff, #5e5ce6);"><i data-lucide="activity"></i></div>
            <div class="dock-dot"></div>
        </button>
        <button class="dock-item" data-label="PDF 분리" onclick="switchApp('pdf', 'PDF 스플리터', '#ff3b30', 'scissors')">
            <div class="dock-icon" style="background: linear-gradient(180deg, #ff5e57, #ff3b30);"><i data-lucide="file-text"></i></div>
            <div class="dock-dot"></div>
        </button>
        <button class="dock-item" data-label="QR 도구" onclick="switchApp('qr', 'QR 마스터', '#007aff', 'qr-code')">
            <div class="dock-icon" style="background: linear-gradient(180deg, #32ade6, #007aff);"><i data-lucide="qr-code"></i></div>
            <div class="dock-dot"></div>
        </button>
        <button class="dock-item" data-label="박수 측정" onclick="switchApp('meter', '박수 측정기', '#ff9500', 'mic')">
            <div class="dock-icon" style="background: linear-gradient(180deg, #ffcc00, #ff9500);"><i data-lucide="mic"></i></div>
            <div class="dock-dot"></div>
        </button>
        <button class="dock-item" data-label="맞춤법 검사" onclick="switchApp('spell', 'Spell Check', '#a78bfa', 'languages')">
            <div class="dock-icon" style="background: linear-gradient(180deg, #a78bfa, #8b5cf6);"><i data-lucide="languages"></i></div>
            <div class="dock-dot"></div>
        </button>
    </div>

    <script>
        lucide.createIcons();

        function updateClock() {
            const now = new Date();
            const isMobile = window.innerWidth < 768;
            const options = isMobile ? { hour: '2-digit', minute: '2-digit' } : { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('mac-clock').innerText = now.toLocaleDateString('ko-KR', options).replace(/,/g, '');
        }
        setInterval(updateClock, 1000); updateClock();

        function closeWindow() {
            if (window.closeApp) window.closeApp();
            document.getElementById('macWindow').classList.add('hidden');
            document.getElementById('desktopBranding').classList.remove('dimmed');
            document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
        }


        function toggleGlobalTheme() {
            const htmlEl = document.documentElement;
            const icon = document.getElementById('globalThemeIcon');
            if (htmlEl.getAttribute('data-theme') === 'dark') {
                htmlEl.removeAttribute('data-theme');
                icon.setAttribute('data-lucide', 'moon');
                if (window.updateCanvasTheme) window.updateCanvasTheme('light');
            } else {
                htmlEl.setAttribute('data-theme', 'dark');
                icon.setAttribute('data-lucide', 'sun');
                if (window.updateCanvasTheme) window.updateCanvasTheme('dark');
            }
            lucide.createIcons();
        }
    </script>
    <script src="js/vibe-background.js"></script>
    <script src="js/app-loader.js"></script>
</body>
</html>
