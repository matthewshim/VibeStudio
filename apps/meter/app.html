
<div class="content-box">
    <p style="font-size: 15px; margin-top:0; font-weight: 500;">도전자 이름을 입력하고 5초간 박수를 쳐보세요!</p>
    <input type="text" id="participantName" class="mac-input" placeholder="도전자 이름 (필수)"
        autocomplete="off">
    <button id="startMeterBtn" class="mac-btn"
        style="background: var(--meter-primary); margin-bottom: 15px;" onclick="startMeasurement()">
        <i data-lucide="play-circle" style="width: 20px;"></i> 측정 시작
    </button>
    <div id="meterStatus"
        style="text-align:center; font-size:14px; font-weight:700; margin-bottom:15px; color:var(--text-muted);">
        대기 중...</div>
    <div class="visualizer-container">
        <canvas id="meterCanvas"></canvas>
        <div class="score-overlay" id="currentScoreDisplay">0</div>
    </div>
    <div style="border-top: 1px solid var(--glass-border); padding-top: 20px; margin-top: 20px;">
        <div style="font-weight: 800; font-size: 16px; text-align: center; margin-bottom: 15px;">🏆 명예의
            전당 (Top 3)</div>
        <ul class="rank-list" id="leaderboardList" style="list-style:none; padding:0; margin:0;">
            <li style="text-align:center; font-size: 14px; font-weight: 500; color:var(--text-muted);">
                아직 기록이 없습니다.</li>
        </ul>
    </div>
</div>
