    <style>
        /* 가로 스크롤 전역 차단 */
        html { overflow-x: hidden; }

        /* 1. macOS 글로벌 테마 변수 (Glassmorphism) */
        :root {
            --bg-main: #F5F5F7;
            --mac-wallpaper: linear-gradient(135deg, #f5f5f7 0%, #e2e2e7 100%);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --menu-bg: rgba(255, 255, 255, 0.4);
            --dock-bg: rgba(255, 255, 255, 0.45);
            --content-bg: rgba(255, 255, 255, 0.6);
            --input-bg: rgba(255, 255, 255, 0.9);
            --input-border: rgba(0, 0, 0, 0.1);
            --sys-primary: #6D28D9;
            --server-primary: #10b981;
            --spell-primary: #8b5cf6;
            --pdf-primary: #ff3b30;
            --qr-primary: #007aff;
            --tangram-primary: #ff6b35;
            --meter-primary: #ff9500;
            --pachinko-primary: #ff2d55;
            --meter-canvas-bg: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-main: #050507;
            --mac-wallpaper: #020202;
            --glass-bg: rgba(30, 30, 32, 0.75);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
            --menu-bg: rgba(0, 0, 0, 0.4);
            --dock-bg: rgba(0, 0, 0, 0.45);
            --content-bg: rgba(0, 0, 0, 0.3);
            --input-bg: rgba(0, 0, 0, 0.5);
            --input-border: rgba(255, 255, 255, 0.1);
            --sys-primary: #5e5ce6;
            --server-primary: #34d399;
            --spell-primary: #a78bfa;
            --pdf-primary: #ff453a;
            --qr-primary: #0a84ff;
            --tangram-primary: #ff8c5a;
            --meter-primary: #ff9f0a;
            --pachinko-primary: #ff375f;
            --meter-canvas-bg: rgba(0, 0, 0, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            overflow: hidden;          /* 스크롤 없음 — 푸터는 fixed로 고정 */
            transition: background 0.5s ease;
        }

        /* PC 본문 영역: GNB ~ Dock 사이 중앙 정렬 */
        .desktop-wrapper {
            width: 100%;
            height: 100dvh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding-top: 89px;             /* GNB(56px) + 독↔푸터 간격(33px) */
            padding-bottom: 215px;         /* dock-top(182px) + 독↔푸터 간격(33px) */
            box-sizing: border-box;
        }

        #vibe-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: var(--mac-wallpaper);
        }

        .mesh-ball {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite alternate;
        }

        [data-theme="dark"] .mesh-gradient { background: #000 !important; }
        [data-theme="dark"] .mesh-ball { opacity: 0.15; filter: blur(100px); }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 100px) scale(1.2); }
        }

        .desktop-branding {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            user-select: none;
            pointer-events: none;  /* 자체는 클릭 차단 */
        }

        /* About 버튼은 클릭 허용 */
        .desktop-branding .about-link-btn { pointer-events: auto; }

        .desktop-branding.dimmed {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.85);
            filter: blur(25px);
        }

        .brand-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: floatBranding 8s ease-in-out infinite;
            margin-bottom: 12px;
        }

        .css-logo-box {
            width: clamp(62px, 10vw, 86px);
            height: clamp(62px, 10vw, 86px);
            margin-bottom: 14px;
            border-radius: 28%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 50%, #d946ef 100%);
            background-size: 200% 200%;
            animation: gradientFlow 4s ease infinite;
            box-shadow: 0 16px 40px rgba(139, 92, 246, 0.5), inset 0 2px 8px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .lightning-svg {
            width: 58%;
            height: 58%;
            fill: #ffffff;
            animation: pulseLightning 2s ease-in-out infinite alternate;
        }

        @keyframes pulseLightning {
            0% { transform: scale(0.92); filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4)); }
            100% { transform: scale(1.15); filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.9)); }
        }

        .branding-title {
            font-weight: 900;
            font-size: clamp(1.5rem, 3vw, 2.4rem);
            letter-spacing: -0.05em;
            line-height: 1;
            color: var(--text-main);
            text-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            margin: 0;
        }

        @keyframes floatBranding {
            0%, 100% { transform: translateY(0px) rotate(-1deg); }
            50% { transform: translateY(-25px) rotate(1deg); }
        }

        .typing-container {
            font-family: ui-monospace, monospace;
            font-size: clamp(0.85rem, 1.6vw, 1.1rem);
            color: var(--sys-primary);
            min-height: 36px;
            font-weight: 600;
            margin-top: 10px;
            opacity: 0.75;
        }

        [data-theme="dark"] .typing-container { color: #E9D5FF; }

        /* About link button in branding area */
        .about-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            margin-top: 28px;
            padding: 10px 22px;
            background: rgba(168,85,247,0.12);
            border: 1px solid rgba(168,85,247,0.35);
            border-radius: 100px;
            color: #a855f7;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -0.2px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            white-space: nowrap;
        }
        .about-link-btn:hover {
            background: rgba(168,85,247,0.22);
            border-color: rgba(168,85,247,0.6);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(168,85,247,0.25);
        }
        .about-link-btn i { width: 14px; height: 14px; }

        [data-theme="light"] .about-link-btn {
            background: rgba(109,40,217,0.08);
            border-color: rgba(109,40,217,0.25);
            color: #6d28d9;
        }
        [data-theme="light"] .about-link-btn:hover {
            background: rgba(109,40,217,0.14);
            border-color: rgba(109,40,217,0.45);
            box-shadow: 0 8px 24px rgba(109,40,217,0.15);
        }

        /* ── Nav Link (Header) ──────────────────────── */
        .nav-link {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            text-decoration: none;
            opacity: 0.7;
            transition: opacity 0.18s;
            letter-spacing: -0.1px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }
        .nav-link:hover { opacity: 1; }
        .nav-link.active { opacity: 1; font-weight: 800; }

        /* ── Theme Button (about.html 동일, 36×36) ── */
        .theme-btn-bar {
            width: 36px; height: 36px;
            border-radius: 8px;
            border: none;                /* 테두리 제거 */
            background: transparent;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }
        .theme-btn-bar:hover { background: var(--glass-bg); color: var(--sys-primary); }
        .theme-btn-bar i { width: 15px; height: 15px; }

        /* ── Nav Separator ───────────────────────────── */
        .nav-sep {
            width: 1px; height: 14px;
            background: var(--glass-border);
            opacity: 0.6;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.1em;
            background-color: currentColor;
            margin-left: 8px;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            border-radius: 2px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* ── Mac Menu Bar (56px, about.html 스타일) ─ */
        .mac-menu-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: var(--menu-bg);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 22px;
            z-index: 10000;
            box-sizing: border-box;
            color: var(--text-main);
        }
        .mac-menu-left  { display: flex; align-items: center; gap: 10px; }
        .mac-menu-right { display: flex; align-items: center; gap: 12px; }

        /* Logo: about.html .nav-brand 동일 */
        .nav-brand-bar {
            display: flex; align-items: center; gap: 10px;
            font-weight: 800; font-size: 15px; letter-spacing: -0.3px;
            color: var(--text-main); text-decoration: none;
        }
        .nav-brand-bar .logo-box {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, #a855f7, #5e5ce6);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .nav-brand-bar .logo-box svg { width: 16px; height: 16px; fill: #fff; stroke: none; }

        /* Nav center group */
        .nav-center {
            display: flex; align-items: center; gap: 4px;
            position: absolute; left: 50%; transform: translateX(-50%);
        }
        .nav-center .nav-sep { margin: 0 2px; }
        @media (max-width: 768px) { .nav-center { display: none; } }
        /* Mobile clock 유지 */
        #mac-clock { font-size: 12px; opacity: 0.7; letter-spacing: -0.2px; }

        /* ── 햄버거 메뉴 버튼 (모바일에서만 보임) ── */
        .hamburger-btn {
            display: none;
            width: 36px; height: 36px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 6px;
            color: var(--text-main);
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .hamburger-btn:hover { background: var(--glass-bg); }
        .hamburger-btn span {
            display: block;
            width: 18px; height: 2px;
            background: var(--text-main);
            border-radius: 2px;
            transition: transform 0.25s, opacity 0.25s, width 0.25s;
        }
        /* X 애니매이션 */
        .hamburger-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger-btn.open span:nth-child(2) { opacity: 0; width: 0; }
        .hamburger-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        @media (max-width: 768px) {
            .hamburger-btn { display: flex; }
        }

        /* PC 기본: hamburger-wrap 숨김 → 로고 좌측 유지 */
        .hamburger-wrap { display: none; }

        /* 모바일: 그리드 레이아웃 + 로고 중앙 */
        @media (max-width: 768px) {
            .mac-menu-bar {
                display: grid;
                grid-template-columns: 40px 1fr 40px;
                align-items: center;
                padding: 0 14px;
            }
            .mac-menu-left  { grid-column: 2; justify-content: center; }
            .mac-menu-right { grid-column: 3; justify-content: flex-end; gap: 8px; }
            .hamburger-wrap { grid-column: 1; display: flex; align-items: center; }
        }

        /* ── Nav Drawer (왼쪽 슬라이드) ── */
        .nav-drawer {
            position: fixed;
            top: 0; left: 0;
            width: min(320px, 85vw);
            height: 100dvh;
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-right: 1px solid var(--glass-border);
            box-shadow: 6px 0 32px rgba(0,0,0,0.28);
            z-index: 20000;
            transform: translateX(-100%);
            transition: transform 0.32s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;          /* 좌우 흐름 내부 콘텐츠 잘라냄 */
            box-sizing: border-box;
        }
        .nav-drawer.open { transform: translateX(0); }

        /* Drawer 헤더 */
        .nav-drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }
        .nav-drawer-brand {
            display: flex; align-items: center; gap: 9px;
            font-weight: 800; font-size: 15px;
            color: var(--text-main); text-decoration: none;
        }
        .nav-drawer-brand .logo-box {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, #a855f7, #5e5ce6);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-drawer-brand .logo-box svg { width: 15px; height: 15px; fill: #fff; stroke: none; }
        .nav-drawer-close {
            width: 32px; height: 32px;
            border: none; background: transparent;
            border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted);
            transition: background 0.2s, color 0.2s;
        }
        .nav-drawer-close:hover { background: var(--glass-border); color: var(--text-main); }
        .nav-drawer-close svg { width: 18px; height: 18px; }

        /* Drawer 메뉴 리스트 */
        .nav-drawer-body {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            overflow-x: hidden;
            box-sizing: border-box;
            width: 100%;
        }
        .nav-drawer-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            border: none;
            background: transparent;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            text-align: left;
            transition: background 0.18s, color 0.18s, transform 0.15s;
        }
        .nav-drawer-item:hover {
            background: rgba(0,0,0,0.06);
            transform: translateX(3px);
        }
        [data-theme="dark"] .nav-drawer-item:hover { background: rgba(255,255,255,0.07); }
        .nav-drawer-item.active {
            background: rgba(168,85,247,0.12);
            color: #a855f7;
        }
        [data-theme="dark"] .nav-drawer-item.active { color: #c084fc; background: rgba(168,85,247,0.15); }
        .nav-drawer-item-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .nav-drawer-item-icon svg { width: 18px; height: 18px; }

        /* Drawer 푸터 */
        .nav-drawer-footer {
            padding: 18px 20px;
            border-top: 1px solid var(--glass-border);
            flex-shrink: 0;
        }
        .nav-drawer-footer-brand {
            display: flex; align-items: center; gap: 6px;
            font-weight: 800; font-size: 12px;
            color: var(--text-main); margin-bottom: 6px;
        }
        .nav-drawer-footer-copy {
            font-size: 10px; color: var(--text-muted); opacity: 0.6;
        }

        /* Drawer 오버레이 */
        .nav-drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.48);
            backdrop-filter: blur(4px);
            z-index: 19999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.32s;
        }
        .nav-drawer-overlay.open { opacity: 1; pointer-events: auto; }

        .mac-window {
            width: 90%;
            max-width: 850px;
            /* 부모(desktop-wrapper)의 패딩된 영역을 꽉 채움 */
            height: 100%;
            max-height: 100%;
            min-height: 280px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }

        .mac-window.hidden {
            display: none !important;
            opacity: 0;
            transform: scale(0.95) translateY(20px);
        }

        .mac-titlebar {
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--glass-border);
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .traffic-lights { 
            position: absolute; 
            left: 15px; 
            top: 50%;
            transform: translateY(-50%);
            display: flex; 
            gap: 8px; 
        }
        .light { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: transform 0.1s; }
        .light:hover { transform: scale(1.1); }
        .light.red { background: #ff5f56; border: 1px solid #e0443e; }
        .light.yellow { background: #ffbd2e; border: 1px solid #dea123; }



        .window-title { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 8px;
            color: var(--text-main);
            font-weight: 700;
            font-size: 15px;
            /* Ensure the title itself is centered in the 52px header */
        }
        .window-title i {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
        }
        .window-title i svg {
            width: 18px !important;
            height: 18px !important;
        }
        .window-title span {
            line-height: 1.2;
            display: inline-block;
        }

        .mac-content-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 30px;
            box-sizing: border-box;
            min-height: 0;   /* flex child가 content에 의해 늘어나지 않도록 */
            -webkit-overflow-scrolling: touch;
            /* Firefox */
            scrollbar-width: thin;
            scrollbar-color: rgba(128,128,128,0.3) transparent;
        }

        /* ── PC 전용: 세련된 macOS 스타일 스크롤바 ── */
        .mac-content-area::-webkit-scrollbar {
            width: 6px;
        }
        .mac-content-area::-webkit-scrollbar-track {
            background: transparent;
            margin: 4px 0;
        }
        .mac-content-area::-webkit-scrollbar-thumb {
            background: rgba(120, 120, 128, 0.3);
            border-radius: 100px;
            transition: background 0.25s;
        }
        .mac-content-area::-webkit-scrollbar-thumb:hover {
            background: rgba(120, 120, 128, 0.55);
        }
        .mac-content-area::-webkit-scrollbar-thumb:active {
            background: rgba(120, 120, 128, 0.75);
        }
        /* 다크 모드 스크롤바 */
        [data-theme="dark"] .mac-content-area {
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        [data-theme="dark"] .mac-content-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.18);
        }
        [data-theme="dark"] .mac-content-area::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.36);
        }
        [data-theme="dark"] .mac-content-area::-webkit-scrollbar-thumb:active {
            background: rgba(255, 255, 255, 0.52);
        }

        .app-view { display: none; animation: fadeEffect 0.3s; }
        .app-view.active { display: block; }
        @keyframes fadeEffect { from { opacity: 0; } to { opacity: 1; } }

        /* App Content Headers */
        .mobile-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: clamp(20px, 4vw, 24px);
            font-weight: 800;
            margin-bottom: 25px;
            line-height: 1;
        }
        .mobile-header i {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 28px;
            height: 28px;
        }
        .mobile-header i svg {
            width: 100% !important;
            height: 100% !important;
        }

        /* ─── macOS Dock ─────────────────────────────────── */
        .mac-dock {
            position: fixed;
            bottom: 100px;             /* 푸터 2행(~88px) + 여유(12px) */
            /* Glassmorphism base */
            background: rgba(255,255,255,0.18);
            backdrop-filter: saturate(180%) blur(40px);
            -webkit-backdrop-filter: saturate(180%) blur(40px);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 22px;
            padding: 10px 14px;
            display: flex;
            align-items: center;       /* 아이콘 수직 가운데 정렬 */
            gap: 10px;
            /* layered shadow for depth */
            box-shadow:
                0 2px 0 rgba(255,255,255,0.55) inset,
                0 -1px 0 rgba(0,0,0,0.08) inset,
                0 16px 40px rgba(0,0,0,0.18),
                0 4px 12px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        [data-theme="dark"] .mac-dock {
            background: rgba(28,28,30,0.72);
            border-color: rgba(255,255,255,0.12);
            box-shadow:
                0 1px 0 rgba(255,255,255,0.08) inset,
                0 20px 48px rgba(0,0,0,0.5),
                0 4px 12px rgba(0,0,0,0.3);
        }

        .theme-toggle {
            background: transparent;
            border: none;
            width: 16px;
            height: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.2s ease;
            padding: 0;
            opacity: 0.6;
            margin: 0 1px;
        }

        .theme-toggle:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .theme-toggle i {
            width: 9px;
            height: 9px;
            stroke-width: 1.2;
        }

        [data-theme="light"] .theme-toggle, 
        :root:not([data-theme="dark"]) .theme-toggle {
            background: transparent;
        }

        .dock-item {
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 9px 4px 0;     /* top: dot 하단여백(5+4px)와 동일하게 상단 여백 확보 */
            /* icon only scales — layout width stays fixed, no overlap */
            transform-origin: bottom center;
        }

        .dock-icon {
            width: 44px;
            height: 44px;
            border-radius: 11px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 아이콘 currentColor 상속용 흘색 설정 */
            color: #fff !important;
            box-shadow:
                0 6px 18px rgba(0,0,0,0.28),
                0 1px 3px rgba(0,0,0,0.15),
                inset 0 1px 0 rgba(255,255,255,0.35);
            border: 1px solid rgba(255,255,255,0.25);
            transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.2s ease;
            transform-origin: bottom center;
            will-change: transform;
            position: relative;
            overflow: hidden;
        }

        /* Sheen highlight on icon top */
        .dock-icon::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.22) 0%, transparent 55%);
            border-radius: inherit;
            pointer-events: none;
        }

        /* Lucide는 <i> 태그를 <svg>로 교체함 → svg 셀렉터로 직접 타겟 */
        .dock-icon svg {
            width: 24px;
            height: 24px;
            display: block;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35));
            position: relative;
            z-index: 1;
            color: #fff !important;
            stroke: #fff !important;
        }
        .dock-icon svg * {
            stroke: #fff !important;
        }
        /* 기존 .dock-icon i 유지 (Lucide 렌더 전 숨겨지지 않게) */

        /* macOS-style label tooltip */
        .dock-label {
            position: absolute;
            bottom: calc(100% + 14px);
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            background: rgba(30,30,32,0.82);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.14);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: -0.2px;
            padding: 5px 11px;
            border-radius: 8px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.18s ease, transform 0.18s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        /* small downward caret */
        .dock-label::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: rgba(30,30,32,0.82);
        }

        [data-theme="light"] .dock-label, :root:not([data-theme="dark"]) .dock-label {
            background: rgba(255,255,255,0.92);
            border-color: rgba(0,0,0,0.1);
            color: #1d1d1f;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        [data-theme="light"] .dock-label::after,
        :root:not([data-theme="dark"]) .dock-label::after {
            border-top-color: rgba(255,255,255,0.92);
        }

        @media (hover: hover) {
            /* hover shadow enhancement only — scale is handled by JS on .dock-icon */
            .dock-item:hover .dock-icon {
                box-shadow:
                    0 10px 28px rgba(0,0,0,0.32),
                    0 2px 6px rgba(0,0,0,0.18),
                    inset 0 1px 0 rgba(255,255,255,0.4);
            }
            .dock-item:hover .dock-label {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .dock-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text-main);
            margin-top: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .dock-item.active .dock-dot { opacity: 1; }

        /* 📱 반응형 (Mobile 모드) */

        @media (max-width: 768px) {
            body { align-items: flex-start; overflow-x: hidden !important; }
            .mac-window {
                width: 100% !important;
                max-width: 100% !important;
                height: calc(100dvh - 56px) !important;
                margin-top: 0;
                border: none;
                border-top: 1px solid var(--glass-border);
                border-radius: 0;
                padding-bottom: 20px;
                box-sizing: border-box;
                z-index: 1500;
                top: 56px !important;
                bottom: 0px !important;
                position: fixed !important;
                transform: translateY(0);
                opacity: 1;
                overflow-x: hidden !important;
            }
            .mac-window.hidden { display: none !important; transform: translateY(100%); }
            .mac-titlebar { 
                display: flex !important; 
                height: 52px; 
                border-radius: 0; 
                background: var(--glass-bg);
            }
            .mac-menu-bar { padding: 0 10px; }
            .mac-menu-right { gap: 6px; }
            #mac-clock { display: none !important; }
            .mac-content-area { padding: 15px; }
            /* Mobile dock — full-width strip */
            .mac-dock {
                width: 100% !important;
                bottom: 0 !important;  /* 모바일: 푸터 숨김이므로 돁 완전 하단 */
                left: 0 !important;
                border-radius: 0;
                border-bottom: none;
                padding: 12px 12px 36px 12px;  /* iOS scroll bug: padding-right 사용 안 함 → last-child margin-right으로 대체 */
                overflow-x: auto;
                overflow-y: visible;
                justify-content: flex-start;
                gap: 8px;
                z-index: 2000;
                align-items: center;
                -webkit-overflow-scrolling: touch;
                min-height: 80px;
                /* 독 슬라이드 애니메이션 */
                transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
            }
            /* 앱 활성화 시: 독 슬라이드 아웃 */
            body.mobile-app-active .mac-dock {
                transform: translateY(110%) !important;
                pointer-events: none;
            }
            /* 앱 활성화 시: 윈도우 전체 높이 활용 */
            body.mobile-app-active .mac-window {
                padding-bottom: 34px !important;
            }
            /* iOS 스타일 홈 인디케이터 */
            .mobile-home-indicator {
                display: none;
                position: fixed;
                bottom: 10px;
                left: 50%;
                transform: translateX(-50%);
                width: 120px;
                height: 5px;
                background: var(--text-main);
                opacity: 0.18;
                border-radius: 100px;
                z-index: 1800;
                pointer-events: none;
            }
            body.mobile-app-active .mobile-home-indicator {
                display: block;
            }
            /* 모바일: desktop-wrapper 원래 높이 복원 */
            .desktop-wrapper {
                height: 100dvh;
                overflow: hidden;
            }
            body { overflow: hidden; }
            /* Admin: 타이틀바와 중복되는 mobile-header 숨김 */
            .admin-container .mobile-header { display: none !important; }
            .dock-icon { width: 48px; height: 48px; border-radius: 12px; }
            .dock-label { display: none !important; }
            /* Mobile text label below icon */
            .dock-item::after {
                content: attr(data-label);
                font-size: 10px;
                font-weight: 600;
                color: var(--text-main);
                margin-top: 5px;
                opacity: 0.75;
                white-space: nowrap;
                letter-spacing: -0.2px;
            }
            .dock-item.active::after { opacity: 1; font-weight: 800; }
            /* 마지막 아이콘이 스크롤 끝에서 잠기지 않도록 우측 여백 확보 (iOS에서 padding-right 대체) */
            .dock-item:last-child { margin-right: 32px; }
            /* 컨텐츠 영역 패딩 축소 */
            .mac-content-area { padding: 16px 16px; }
            /* 모바일: footer 숨김 (border-top이 반투명 윈도우에 비치는 현상 방지) */
            .mac-footer { display: none !important; }
            /* 모바일: 스크롤바 완전 숨김 (수직 스크롤바 우측 + 하단 굵은 인디케이터 제거) */
            ::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
            * { scrollbar-width: none !important; -ms-overflow-style: none !important; }
        }

        /* ── Footer ────────────────────────────────────────────── */
        .mac-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 900;
            border-top: 1px solid var(--glass-border);
            padding: 14px 28px;
            font-size: 13px;
            color: var(--text-muted);
            background: var(--bg-main);
        }
        .footer-inner {
            display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap;
            gap: 10px; max-width: 900px; margin: 0 auto 0;
        }
        .footer-brand {
            display: flex; align-items: center; gap: 8px;
            font-weight: 800; font-size: 13px; color: var(--text-main);
        }
        .footer-links {
            display: flex; align-items: center; gap: 2px;
        }
        .footer-links a,
        .footer-links button {
            font-size: 12px; font-weight: 600; color: var(--text-muted);
            text-decoration: none; background: none; border: none; cursor: pointer;
            padding: 3px 10px; border-radius: 6px; transition: color 0.15s, background 0.15s;
        }
        .footer-links a:hover, .footer-links button:hover {
            color: var(--text-main); background: rgba(0,0,0,0.06);
        }
        [data-theme="dark"] .footer-links a:hover,
        [data-theme="dark"] .footer-links button:hover {
            background: rgba(255,255,255,0.08);
        }
        .footer-copy {
            font-size: 11px; color: var(--text-muted); opacity: 0.6;
            text-align: center; max-width: 900px; margin: 4px auto 0;
        }
        /* 앱 창 열릴 때 푸터 숨김 */
        .mac-footer.hidden-by-app {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        /* 모바일: 독이 전체폭 바텀이므로 푸터 숨김 */
        @media (max-width: 768px) {
            .mac-footer { display: none !important; }
        }

        /* 공통 컴포넌트 */
        .mac-input {
            width: 100%;
            padding: 14px 15px;
            margin-bottom: 15px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-main);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
        }
        .mac-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .mac-btn:active { transform: scale(0.97); }

        /* ── Orbit Layer — Hub & Spoke 컴셋 ──────────────── */
        .orbit-layer {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1), filter 0.8s;
        }
        .orbit-layer.dimmed { opacity: 0; filter: blur(20px); pointer-events: none; }
        .orbit-svg {
            position: absolute; inset: 0;
            width: 100%; height: 100%; overflow: visible;
        }
        .orbit-node {
            position: absolute;
            pointer-events: auto;
            display: flex; flex-direction: column;
            align-items: center; gap: 8px;
            background: transparent; border: none; padding: 0;
            cursor: pointer; width: 76px; text-align: center;
        }
        .orbit-node-circle {
            width: 54px; height: 54px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 1.5px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 18px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
            font-size: 22px; line-height: 1; position: relative;
            transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, border-color 0.2s;
        }
        .orbit-node-circle::after {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            background: rgba(255,255,255,0.07); pointer-events: none;
        }
        .orbit-node:hover .orbit-node-circle {
            transform: scale(1.22);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 24px rgba(168,85,247,0.5), 0 0 0 5px rgba(168,85,247,0.14), 0 8px 28px rgba(0,0,0,0.35);
        }
        .orbit-node:active .orbit-node-circle { transform: scale(0.9); }
        .orbit-node-name {
            font-size: 10px; font-weight: 600;
            color: var(--text-muted); white-space: nowrap;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }
        /* 독 아이콘 이모지 스타일 */
        .dock-icon { font-size: 26px !important; }
        .dock-icon i, .dock-icon svg { display: none; }
        @media (max-width: 768px) {
            .orbit-node { width: 58px; }
            .orbit-node-circle { width: 44px; height: 44px; font-size: 18px; }
            .orbit-node-name { font-size: 9px; }
        }
    </style>
</head>

    <!-- Nav Drawer 오버레이 -->
    <div class="nav-drawer-overlay" id="navDrawerOverlay" onclick="closeNavDrawer()"></div>

    <!-- Nav Drawer 패널 -->
    <nav class="nav-drawer" id="navDrawer">
        <!-- 드로어 헤더 -->

    <script>
        lucide.createIcons();

        /* 테마 초기 아이콘 설정 */
        (function() {
            var currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            var icon = document.getElementById('globalThemeIcon');
            if (icon) icon.setAttribute('data-lucide', currentTheme === 'dark' ? 'sun' : 'moon');
            lucide.createIcons();
        })();

        /* ── Nav Drawer (햄버거 메뉴) ──────────────────────────────── */
        function openNavDrawer() {
            document.getElementById('navDrawer').classList.add('open');
            document.getElementById('navDrawerOverlay').classList.add('open');
            document.getElementById('hamburgerBtn').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeNavDrawer() {
            document.getElementById('navDrawer').classList.remove('open');
            document.getElementById('navDrawerOverlay').classList.remove('open');
            document.getElementById('hamburgerBtn').classList.remove('open');
            document.body.style.overflow = '';
        }
        /* ESC 키로 드로어 닫기 */
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeNavDrawer();
        });

        /* ── macOS Magnetic Dock Effect ───────────────────────────── */
        (function () {
            const dock = document.getElementById('macDock');
            if (!dock) return;
            const MAX_SCALE = 1.5;   // max scale for hovered icon
            const SPREAD = 90;       // px radius of influence on neighbours

            function applyMagnetic(mouseX) {
                const items = dock.querySelectorAll('.dock-item');
                items.forEach(item => {
                    const icon = item.querySelector('.dock-icon');
                    if (!icon) return;
                    const rect = item.getBoundingClientRect();
                    const center = rect.left + rect.width / 2;
                    const dist = Math.abs(mouseX - center);
                    const ratio = Math.max(0, 1 - dist / SPREAD);
                    const scale = 1 + (MAX_SCALE - 1) * ratio;
                    const lift = -10 * ratio;
                    // Scale ONLY the icon element — dock-item layout width stays fixed
                    icon.style.transform = `translateY(${lift}px) scale(${scale})`;
                });
            }

            function resetMagnetic() {
                dock.querySelectorAll('.dock-icon').forEach(icon => {
                    icon.style.transform = '';
                });
            }

            dock.addEventListener('mousemove', e => applyMagnetic(e.clientX));
            dock.addEventListener('mouseleave', resetMagnetic);
        })();

        function updateClock() {
            const now = new Date();
            const isMobile = window.innerWidth < 768;
            const options = isMobile
                ? { hour: '2-digit', minute: '2-digit', hour12: true }
                : { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true };
            document.getElementById('mac-clock').innerText = now.toLocaleString('en-US', options);
        }
        setInterval(updateClock, 1000); updateClock();

        function closeWindow() {
            if (window.closeApp) window.closeApp();
            document.getElementById('macWindow').classList.add('hidden');
            document.getElementById('desktopBranding').classList.remove('dimmed');
            document.getElementById('orbitLayer')?.classList.remove('dimmed');
            document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
            // 모바일: 독 복원
            document.body.classList.remove('mobile-app-active');
        }


        function toggleGlobalTheme() {
            const htmlEl = document.documentElement;
            const icon = document.getElementById('globalThemeIcon');
            const isDark = htmlEl.getAttribute('data-theme') === 'dark';
            if (isDark) {
                htmlEl.setAttribute('data-theme', 'light');
                localStorage.setItem('vibe-theme', 'light');
                icon.setAttribute('data-lucide', 'moon');
                if (window.updateCanvasTheme) window.updateCanvasTheme('light');
            } else {
                htmlEl.setAttribute('data-theme', 'dark');
                localStorage.setItem('vibe-theme', 'dark');
                icon.setAttribute('data-lucide', 'sun');
                if (window.updateCanvasTheme) window.updateCanvasTheme('dark');
            }
            lucide.createIcons();
        }

        function contactAlert() {
            alert('✉️ Contact\n\n아직 준비 중입니다!\n빠른 시일 내에 연락처 페이지를 오픈할게요 :)');
        }

        // ?admin=1 파라미터로 진입 시 자동으로 관리자 패널 오픈 (about.html Administrator 연동)
        /* ── Orbit Layer: Hub & Spoke 포지셔닝 ──────────────── */
        function initOrbit() {
            const layer = document.getElementById('orbitLayer');
            if (!layer) return;
            const nodes = layer.querySelectorAll('.orbit-node');
            const svg   = document.getElementById('orbitSvg');
            svg.querySelectorAll('.orbit-line, .orbit-center').forEach(el => el.remove());

            const navH = 89, dockH = 215;
            const W = window.innerWidth, H = window.innerHeight;
            const cx = W / 2;
            // cy = branding의 CSS top:50% 실제 위치와 일치
            const cy = H * 0.5;

            // 반경: 네비게이션/독 업보 반경 안적으로 동적 조절
            const topClear  = cy - navH - 62;   // 네비게이션 보호 여백
            const botClear  = H - dockH - cy - 42; // 독 보호 여백
            const r = Math.min(
                Math.max(Math.min(W * 0.17, topClear, botClear), 120),
                215
            );

            // 8앱 각도 — 60°∼120° 독 영역 회피, 각 노드 최소 35° 간격 보장
            // spell(-90°상단), qr(-45°), pdf(0°), tangram(40°),
            // [50°~125° = 독영역], pachinko(130°), server(170°), meter(-150°), sys(-115°)
            const angles = [-90, -45, 0, 40, 130, 170, -150, -115];

            nodes.forEach((node, i) => {
                const rad = angles[i] * Math.PI / 180;
                const nx  = cx + r * Math.cos(rad);
                const ny  = cy + r * Math.sin(rad);

                // 원형 노드 크기: 54px 원 + 레이블 ~22px
                const nw = 76, nh = 80;
                node.style.left = (nx - nw / 2) + 'px';
                node.style.top  = (ny - nh / 2) + 'px';

                // 연결선: 실선, 중심에서 노드 원 가장자리까지
                const edgeR  = 27; // 원 반지름 (54/2)
                const dist   = Math.hypot(nx - cx, ny - cy);
                const ux = (nx - cx) / dist, uy = (ny - cy) / dist;
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', cx + ux * 6);  // 중심에서 약간 먹도
                line.setAttribute('y1', cy + uy * 6);
                line.setAttribute('x2', nx - ux * edgeR); // 노드 가장자리
                line.setAttribute('y2', ny - uy * edgeR);
                line.setAttribute('class', 'orbit-line');
                line.setAttribute('stroke', 'rgba(168,85,247,0.25)');
                line.setAttribute('stroke-width', '1');
                line.setAttribute('stroke-linecap', 'round');
                svg.appendChild(line);
            });

            // 중심 글로우 돈 (점답 표시)
            const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dot.setAttribute('cx', cx); dot.setAttribute('cy', cy); dot.setAttribute('r', '6');
            dot.setAttribute('fill', 'rgba(168,85,247,0.6)');
            dot.setAttribute('class', 'orbit-center');
            svg.appendChild(dot);
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (new URLSearchParams(location.search).get('admin') === '1') {
                setTimeout(() => { if (window.openAdmin) window.openAdmin(); }, 600);
            }
            applyAppSettings();
            setTimeout(initOrbit, 150); // DOM 렌더 완료 후 실행
        });
        window.addEventListener('resize', () => {
            clearTimeout(window._orbitTimer);
            window._orbitTimer = setTimeout(initOrbit, 80);
        });

        // 앱 설정 로드 후 독 버튼 표시/숨김 적용
        async function applyAppSettings() {
            try {
                const res  = await fetch('admin.php?action=app_settings_get', { cache: 'no-store' });
                const data = await res.json();
                if (!data.success || !data.settings.length) return;
                data.settings.forEach(s => {
                    const display = parseInt(s.enabled) === 0 ? 'none' : '';
                    // 독 버튼
                    const btn = document.querySelector(`.dock-item[data-app-key="${s.app_key}"]`);
                    if (btn) btn.style.display = display;
                    // Orbit 노드 (어드민 on/off 동시 적용)
                    const node = document.querySelector(`.orbit-node[data-app-key="${s.app_key}"]`);
                    if (node) node.style.display = display;
                });
            } catch (e) { /* 설정 로드 실패 시 모두 표시 유지 */ }
        }

        // 외부에서 독 버튼 상태 갱신 (관리자 패널 토글 시 즉시 반영)
        window.refreshDockVisibility = applyAppSettings;
    </script>
