    <style>
        /* 가로 스크롤 전역 차단 */
        html { overflow-x: hidden; }

        /* 1. macOS 글로벌 테마 변수 (Glassmorphism) */
        :root {
            --bg-main: #F5F5F7;
            --mac-wallpaper: linear-gradient(135deg, #f5f5f7 0%, #e2e2e7 100%);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --menu-bg: rgba(255, 255, 255, 0.4);
            --dock-bg: rgba(255, 255, 255, 0.45);
            --content-bg: rgba(255, 255, 255, 0.6);
            --input-bg: rgba(255, 255, 255, 0.9);
            --input-border: rgba(0, 0, 0, 0.1);
            --sys-primary: #6D28D9;
            --server-primary: #10b981;
            --spell-primary: #8b5cf6;
            --pdf-primary: #ff3b30;
            --qr-primary: #007aff;
            --tangram-primary: #ff6b35;
            --meter-primary: #ff9500;
            --pachinko-primary: #ff2d55;
            --meter-canvas-bg: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-main: #050507;
            --mac-wallpaper: #020202;
            --glass-bg: rgba(30, 30, 32, 0.75);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
            --menu-bg: rgba(0, 0, 0, 0.4);
            --dock-bg: rgba(0, 0, 0, 0.45);
            --content-bg: rgba(0, 0, 0, 0.3);
            --input-bg: rgba(0, 0, 0, 0.5);
            --input-border: rgba(255, 255, 255, 0.1);
            --sys-primary: #5e5ce6;
            --server-primary: #34d399;
            --spell-primary: #a78bfa;
            --pdf-primary: #ff453a;
            --qr-primary: #0a84ff;
            --tangram-primary: #ff8c5a;
            --meter-primary: #ff9f0a;
            --pachinko-primary: #ff375f;
            --meter-canvas-bg: rgba(0, 0, 0, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            overflow-y: auto;
            transition: background 0.5s ease;
        }
        /* 앱 실행 중에는 스크롤 차단 */
        body.app-active {
            overflow: hidden;
        }

        /* ── 홈 메인 컨텐츠 래퍼 (스크롤) ── */
        .desktop-wrapper {
            width: 100%;
            min-height: 100dvh;
            position: relative;
            display: block;
            box-sizing: border-box;
        }
        /* 홈 컨텐츠만 fade: mac-window/dock/nav는 영향 없음 */
        .home-content {
            width: 100%;
            overflow-x: hidden;
            transition: opacity 0.5s, filter 0.5s;
        }
        body.app-active .home-content {
            opacity: 0;
            pointer-events: none;
            filter: blur(12px);
        }

        #vibe-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: var(--mac-wallpaper);
        }

        .mesh-ball {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite alternate;
        }

        [data-theme="dark"] .mesh-gradient { background: #000 !important; }
        [data-theme="dark"] .mesh-ball { opacity: 0.15; filter: blur(100px); }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 100px) scale(1.2); }
        }

        /* ── Hero 섹션 (상단 Vibe Studio 브랜딩) ── */
        .desktop-branding {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: clamp(80px, 12vw, 120px) 24px clamp(48px, 8vw, 72px);
            transition: opacity 0.6s, filter 0.6s;
            user-select: none;
            min-height: 45dvh;
        }
        .desktop-branding.dimmed {
            opacity: 0;
            filter: blur(20px);
        }

        .brand-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: floatBranding 8s ease-in-out infinite;
            margin-bottom: 12px;
        }

        .css-logo-box {
            width: clamp(62px, 10vw, 86px);
            height: clamp(62px, 10vw, 86px);
            margin-bottom: 14px;
            border-radius: 28%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 50%, #d946ef 100%);
            background-size: 200% 200%;
            animation: gradientFlow 4s ease infinite;
            box-shadow: 0 16px 40px rgba(139, 92, 246, 0.5), inset 0 2px 8px rgba(255, 255, 255, 0.5);
            /* backdrop-filter 제거: 로고 투명도 이슈 방지 */
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .lightning-svg {
            width: 58%;
            height: 58%;
            fill: #ffffff;
            animation: pulseLightning 2s ease-in-out infinite alternate;
        }

        @keyframes pulseLightning {
            0% { transform: scale(0.92); filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4)); }
            100% { transform: scale(1.15); filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.9)); }
        }

        .branding-title {
            font-weight: 900;
            font-size: clamp(1.5rem, 3vw, 2.4rem);
            letter-spacing: -0.05em;
            line-height: 1;
            color: var(--text-main);
            text-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            margin: 0;
        }

        @keyframes floatBranding {
            0%, 100% { transform: translateY(0px) rotate(-1deg); }
            50% { transform: translateY(-25px) rotate(1deg); }
        }

        .typing-container {
            font-family: ui-monospace, monospace;
            font-size: clamp(0.85rem, 1.6vw, 1.1rem);
            color: var(--sys-primary);
            min-height: 36px;
            font-weight: 600;
            margin-top: 10px;
            opacity: 0.75;
        }

        [data-theme="dark"] .typing-container { color: #E9D5FF; }

        /* About link button in branding area */
        .about-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            margin-top: 28px;
            padding: 10px 22px;
            background: rgba(168,85,247,0.12);
            border: 1px solid rgba(168,85,247,0.35);
            border-radius: 100px;
            color: #a855f7;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -0.2px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            white-space: nowrap;
        }
        .about-link-btn:hover {
            background: rgba(168,85,247,0.22);
            border-color: rgba(168,85,247,0.6);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(168,85,247,0.25);
        }
        .about-link-btn i { width: 14px; height: 14px; }

        [data-theme="light"] .about-link-btn {
            background: rgba(109,40,217,0.08);
            border-color: rgba(109,40,217,0.25);
            color: #6d28d9;
        }
        [data-theme="light"] .about-link-btn:hover {
            background: rgba(109,40,217,0.14);
            border-color: rgba(109,40,217,0.45);
            box-shadow: 0 8px 24px rgba(109,40,217,0.15);
        }

        /* ── Nav Link / Sep / Theme Btn: layout.js shared-* 클래스로 대체됨 ── */

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.1em;
            background-color: currentColor;
            margin-left: 8px;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            border-radius: 2px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* ── Top Nav (about.html .top-nav와 동일 구조, layout.js 주입) ─ */
        .top-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: var(--menu-bg);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 22px;
            z-index: 10000;
            box-sizing: border-box;
            color: var(--text-main);
        }
        [data-theme="light"] .top-nav {
            background: rgba(245, 245, 247, 0.82);
        }

        /* layout.js가 주입하는 .nav-brand */
        .nav-brand {
            display: flex; align-items: center; gap: 10px;
            font-weight: 800; font-size: 15px; letter-spacing: -0.3px;
            color: var(--text-main); text-decoration: none;
        }
        .nav-brand .lightning {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, #a855f7, #5e5ce6);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .nav-brand .lightning svg { width: 16px; height: 16px; fill: #fff; stroke: none; }

        /* layout.js .nav-right / .theme-btn */
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .theme-btn {
            width: 36px; height: 36px;
            border-radius: 8px;
            border: none;
            background: transparent;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }
        .theme-btn:hover { background: var(--glass-bg); color: var(--sys-primary); }
        .theme-btn i { width: 15px; height: 15px; }

        /* PC 헤더 시계 숨김 */
        #mac-clock { display: none !important; }

        /* ── 햄버거 메뉴 버튼 (모바일에서만 보임) ── */
        .hamburger-btn {
            display: none;
            width: 36px; height: 36px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 6px;
            color: var(--text-main);
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .hamburger-btn:hover { background: var(--glass-bg); }
        .hamburger-btn span {
            display: block;
            width: 18px; height: 2px;
            background: var(--text-main);
            border-radius: 2px;
            transition: transform 0.25s, opacity 0.25s, width 0.25s;
        }
        .hamburger-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger-btn.open span:nth-child(2) { opacity: 0; width: 0; }
        .hamburger-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        @media (max-width: 768px) { .hamburger-btn { display: flex; } }

        /* PC 기본: hamburger-wrap 숨김 */
        .hamburger-wrap { display: none; }

        /* 모바일: 그리드 레이아웃 + 로고 중앙 */
        @media (max-width: 768px) {
            .top-nav {
                display: grid;
                grid-template-columns: 40px 1fr 40px;
                align-items: center;
                padding: 0 14px;
            }
            .hamburger-wrap { grid-column: 1; display: flex; align-items: center; }
            .nav-brand      { grid-column: 2; justify-content: center; }
            .nav-right      { grid-column: 3; justify-content: flex-end; gap: 8px; }
        }

        /* ── Nav Drawer (왼쪽 슬라이드) ── */
        .nav-drawer {
            position: fixed;
            top: 0; left: 0;
            width: min(320px, 85vw);
            height: 100dvh;
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-right: 1px solid var(--glass-border);
            box-shadow: 6px 0 32px rgba(0,0,0,0.28);
            z-index: 20000;
            transform: translateX(-100%);
            transition: transform 0.32s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;          /* 좌우 흐름 내부 콘텐츠 잘라냄 */
            box-sizing: border-box;
        }
        .nav-drawer.open { transform: translateX(0); }

        /* Drawer 헤더 */
        .nav-drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }
        .nav-drawer-brand {
            display: flex; align-items: center; gap: 9px;
            font-weight: 800; font-size: 15px;
            color: var(--text-main); text-decoration: none;
        }
        .nav-drawer-brand .logo-box {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, #a855f7, #5e5ce6);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-drawer-brand .logo-box svg { width: 15px; height: 15px; fill: #fff; stroke: none; }
        .nav-drawer-close {
            width: 32px; height: 32px;
            border: none; background: transparent;
            border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted);
            transition: background 0.2s, color 0.2s;
        }
        .nav-drawer-close:hover { background: var(--glass-border); color: var(--text-main); }
        .nav-drawer-close svg { width: 18px; height: 18px; }

        /* Drawer 메뉴 리스트 */
        .nav-drawer-body {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            overflow-x: hidden;
            box-sizing: border-box;
            width: 100%;
        }
        .nav-drawer-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            border: none;
            background: transparent;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            text-align: left;
            transition: background 0.18s, color 0.18s, transform 0.15s;
        }
        .nav-drawer-item:hover {
            background: rgba(0,0,0,0.06);
            transform: translateX(3px);
        }
        [data-theme="dark"] .nav-drawer-item:hover { background: rgba(255,255,255,0.07); }
        .nav-drawer-item.active {
            background: rgba(168,85,247,0.12);
            color: #a855f7;
        }
        [data-theme="dark"] .nav-drawer-item.active { color: #c084fc; background: rgba(168,85,247,0.15); }
        .nav-drawer-item-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .nav-drawer-item-icon svg { width: 18px; height: 18px; }

        /* Drawer 푸터 */
        .nav-drawer-footer {
            padding: 18px 20px;
            border-top: 1px solid var(--glass-border);
            flex-shrink: 0;
        }
        .nav-drawer-footer-brand {
            display: flex; align-items: center; gap: 6px;
            font-weight: 800; font-size: 12px;
            color: var(--text-main); margin-bottom: 6px;
        }
        .nav-drawer-footer-copy {
            font-size: 10px; color: var(--text-muted); opacity: 0.6;
        }

        /* Drawer 오버레이 */
        .nav-drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.48);
            backdrop-filter: blur(4px);
            z-index: 19999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.32s;
        }
        .nav-drawer-overlay.open { opacity: 1; pointer-events: auto; }

        .mac-window {
            position: fixed;
            top: calc(56px + 20px);   /* nav 높이(56px) + 상단 여백(20px) */
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 860px;
            /* footer(67px) + 상하 균등 여백(20px × 2) */
            height: calc(100dvh - 56px - 20px - 67px - 20px);
            max-height: none;
            min-height: 280px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow), 0 0 0 1px rgba(255,255,255,0.06) inset;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 200;
        }

        .mac-window.hidden {
            display: none !important;
            opacity: 0;
            transform: translateX(-50%) scale(0.95) translateY(20px);
        }

        .mac-titlebar {
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--glass-border);
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .traffic-lights { 
            position: absolute; 
            left: 15px; 
            top: 50%;
            transform: translateY(-50%);
            display: flex; 
            gap: 8px; 
        }
        .light { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: transform 0.1s; }
        .light:hover { transform: scale(1.1); }
        .light.red { background: #ff5f56; border: 1px solid #e0443e; }
        .light.yellow { background: #ffbd2e; border: 1px solid #dea123; }



        .window-title { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 8px;
            color: var(--text-main);
            font-weight: 700;
            font-size: 15px;
            /* Ensure the title itself is centered in the 52px header */
        }
        .window-title i {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
        }
        .window-title i svg {
            width: 18px !important;
            height: 18px !important;
        }
        .window-title span {
            line-height: 1.2;
            display: inline-block;
        }

        .mac-content-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 30px;
            box-sizing: border-box;
            min-height: 0;   /* flex child가 content에 의해 늘어나지 않도록 */
            -webkit-overflow-scrolling: touch;
            /* Firefox */
            scrollbar-width: thin;
            scrollbar-color: rgba(128,128,128,0.3) transparent;
        }

        /* ── PC 전용: 세련된 macOS 스타일 스크롤바 ── */
        .mac-content-area::-webkit-scrollbar {
            width: 6px;
        }
        .mac-content-area::-webkit-scrollbar-track {
            background: transparent;
            margin: 4px 0;
        }
        .mac-content-area::-webkit-scrollbar-thumb {
            background: rgba(120, 120, 128, 0.3);
            border-radius: 100px;
            transition: background 0.25s;
        }
        .mac-content-area::-webkit-scrollbar-thumb:hover {
            background: rgba(120, 120, 128, 0.55);
        }
        .mac-content-area::-webkit-scrollbar-thumb:active {
            background: rgba(120, 120, 128, 0.75);
        }
        /* 다크 모드 스크롤바 */
        [data-theme="dark"] .mac-content-area {
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        [data-theme="dark"] .mac-content-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.18);
        }
        [data-theme="dark"] .mac-content-area::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.36);
        }
        [data-theme="dark"] .mac-content-area::-webkit-scrollbar-thumb:active {
            background: rgba(255, 255, 255, 0.52);
        }

        .app-view { display: none; animation: fadeEffect 0.3s; }
        .app-view.active { display: block; }
        @keyframes fadeEffect { from { opacity: 0; } to { opacity: 1; } }

        /* App Content Headers */
        .mobile-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: clamp(20px, 4vw, 24px);
            font-weight: 800;
            margin-bottom: 25px;
            line-height: 1;
        }
        .mobile-header i {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 28px;
            height: 28px;
        }
        .mobile-header i svg {
            width: 100% !important;
            height: 100% !important;
        }

        /* ─── macOS Dock ─────────────────────────────────── */
        .mac-dock {
            position: fixed;
            left: 16px;
            top: 50%;
            /* PC 기본: 숨김 (앱 실행 시에만 표시) */
            transform: translateY(-50%) translateX(calc(-100% - 20px));
            opacity: 0;
            pointer-events: none;
            background: rgba(255,255,255,0.18);
            backdrop-filter: saturate(180%) blur(40px);
            -webkit-backdrop-filter: saturate(180%) blur(40px);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 24px;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow:
                0 2px 0 rgba(255,255,255,0.55) inset,
                0 -1px 0 rgba(0,0,0,0.08) inset,
                0 16px 40px rgba(0,0,0,0.18),
                0 4px 12px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: transform 0.42s cubic-bezier(0.16,1,0.3,1), opacity 0.3s ease;
        }
        /* 앱 실행 시: 독 슈라이드인 */
        body.app-active .mac-dock {
            transform: translateY(-50%) translateX(0);
            opacity: 1;
            pointer-events: all;
        }

        [data-theme="dark"] .mac-dock {
            background: rgba(28,28,30,0.72);
            border-color: rgba(255,255,255,0.12);
            box-shadow:
                0 1px 0 rgba(255,255,255,0.08) inset,
                0 20px 48px rgba(0,0,0,0.5),
                0 4px 12px rgba(0,0,0,0.3);
        }

        .theme-toggle {
            background: transparent;
            border: none;
            width: 16px;
            height: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.2s ease;
            padding: 0;
            opacity: 0.6;
            margin: 0 1px;
        }

        .theme-toggle:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .theme-toggle i {
            width: 9px;
            height: 9px;
            stroke-width: 1.2;
        }

        [data-theme="light"] .theme-toggle, 
        :root:not([data-theme="dark"]) .theme-toggle {
            background: transparent;
        }

        .dock-item {
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 9px 4px 0;     /* top: dot 하단여백(5+4px)와 동일하게 상단 여백 확보 */
            /* icon only scales — layout width stays fixed, no overlap */
            transform-origin: bottom center;
        }

        .dock-icon {
            width: 44px;
            height: 44px;
            border-radius: 11px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 아이콘 currentColor 상속용 흘색 설정 */
            color: #fff !important;
            box-shadow:
                0 6px 18px rgba(0,0,0,0.28),
                0 1px 3px rgba(0,0,0,0.15),
                inset 0 1px 0 rgba(255,255,255,0.35);
            border: 1px solid rgba(255,255,255,0.25);
            transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.2s ease;
            transform-origin: bottom center;
            will-change: transform;
            position: relative;
            overflow: hidden;
        }

        /* Sheen highlight on icon top */
        .dock-icon::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.22) 0%, transparent 55%);
            border-radius: inherit;
            pointer-events: none;
        }

        /* Lucide는 <i> 태그를 <svg>로 교체함 → svg 셀렉터로 직접 타겟 */
        .dock-icon svg {
            width: 24px;
            height: 24px;
            display: block;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35));
            position: relative;
            z-index: 1;
            color: #fff !important;
            stroke: #fff !important;
        }
        .dock-icon svg * {
            stroke: #fff !important;
        }
        /* 기존 .dock-icon i 유지 (Lucide 렌더 전 숨겨지지 않게) */

        /* macOS-style label tooltip — 좌측 독일 때 우측에 표시 */
        .dock-label {
            position: absolute;
            top: 50%;
            left: calc(100% + 14px);
            transform: translateY(-50%) translateX(-6px);
            background: rgba(30,30,32,0.82);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.14);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: -0.2px;
            padding: 5px 11px;
            border-radius: 8px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.18s ease, transform 0.18s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        /* 좌측 종료형 캐럫 (오른쪽 화살표) */
        .dock-label::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 100%;
            transform: translateY(-50%);
            border: 5px solid transparent;
            border-right-color: rgba(30,30,32,0.82);
        }

        [data-theme="light"] .dock-label, :root:not([data-theme="dark"]) .dock-label {
            background: rgba(255,255,255,0.92);
            border-color: rgba(0,0,0,0.1);
            color: #1d1d1f;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        [data-theme="light"] .dock-label::after,
        :root:not([data-theme="dark"]) .dock-label::after {
            border-top-color: rgba(255,255,255,0.92);
        }

        @media (hover: hover) {
            /* hover shadow enhancement only — scale is handled by JS on .dock-icon */
            .dock-item:hover .dock-icon {
                box-shadow:
                    0 10px 28px rgba(0,0,0,0.32),
                    0 2px 6px rgba(0,0,0,0.18),
                    inset 0 1px 0 rgba(255,255,255,0.4);
            }
            .dock-item:hover .dock-label {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
        }

        .dock-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-main);
            opacity: 0;
            transition: opacity 0.3s;
            position: absolute;
            bottom: -7px;
            left: 50%;
            transform: translateX(-50%);
        }
        .dock-item.active .dock-dot { opacity: 1; }

        /* -- Share button (titlebar right): 아이콘만, 배경 없음 -- */
        .window-share-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border-radius: 6px;
            transition: color 0.18s, background 0.18s;
            flex-shrink: 0;
        }
        .window-share-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        .window-share-btn:active { opacity: 0.7; }
        .window-share-btn i,
        .window-share-btn svg {
            width: 15px !important;
            height: 15px !important;
            pointer-events: none;
        }
        [data-theme="light"] .window-share-btn { color: rgba(0,0,0,0.5); }
        [data-theme="light"] .window-share-btn:hover { color: #1d1d1f; background: rgba(0,0,0,0.07); }
        /* -- Share popover: JS가 버튼을 기준으로 위치 계산 -- */
        .share-popover {
            position: fixed;
            width: 292px;
            background: rgba(12,8,22,0.97);
            backdrop-filter: blur(28px) saturate(200%);
            -webkit-backdrop-filter: blur(28px) saturate(200%);
            border: 1px solid rgba(168,85,247,0.32);
            border-radius: 18px;
            padding: 18px;
            z-index: 99999;
            box-shadow:
                0 20px 60px rgba(0,0,0,0.6),
                0 0 0 1px rgba(168,85,247,0.07) inset;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        @media (max-width: 768px) {
            .share-popover {
                width: calc(100vw - 24px);
                max-width: 340px;
            }
        }
        .share-popover.open {
            display: flex;
            animation: sharePopIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes sharePopIn {
            from { opacity: 0; transform: translateY(-8px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }
        .share-popover-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.92);
            letter-spacing: -0.3px;
        }
        .share-popover-app-name {
            font-size: 11px;
            font-weight: 500;
            color: rgba(168,85,247,0.75);
            letter-spacing: -0.1px;
        }
        .share-popover-url-row {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 9px 12px;
        }
        .share-popover-url-row #sharePopoverUrl {
            flex: 1;
            font-size: 11px;
            color: rgba(255,255,255,0.45);
            font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            user-select: all;
        }
        .share-popover-copy {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            background: linear-gradient(135deg, #a855f7 0%, #5e5ce6 100%);
            border: none;
            border-radius: 11px;
            padding: 11px 18px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -0.3px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.12s, background 0.3s;
            box-shadow: 0 4px 18px rgba(168,85,247,0.38);
        }
        .share-popover-copy:hover  { opacity: 0.9; transform: scale(0.99); }
        .share-popover-copy:active { transform: scale(0.97); }
        .share-popover-copy.copied {
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            box-shadow: 0 4px 18px rgba(52,211,153,0.38);
        }

        /* 📱 반응형 (Mobile 모드) */

        @media (max-width: 768px) {
            body { align-items: flex-start; overflow-x: hidden !important; }
            .mac-window {
                width: 100% !important;
                max-width: 100% !important;
                height: calc(100dvh - 56px) !important;
                margin-top: 0;
                border: none;
                border-top: 1px solid var(--glass-border);
                border-radius: 0;
                padding-bottom: 20px;
                box-sizing: border-box;
                z-index: 1500;
                top: 56px !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0px !important;
                position: fixed !important;
                transform: translateY(0) !important;
                opacity: 1;
                overflow-x: hidden !important;
            }
            .mac-window.hidden { display: none !important; transform: translateY(100%) !important; }
            .mac-titlebar { 
                display: flex !important; 
                height: 52px; 
                border-radius: 0; 
                background: var(--glass-bg);
            }
            .mac-menu-bar { padding: 0 10px; }
            .mac-menu-right { gap: 6px; }
            #mac-clock { display: none !important; }
            .mac-content-area { padding: 15px; }
            /* Mobile dock — full-width strip */
            .mac-dock {
                width: 100% !important;
                bottom: 0 !important;  /* 모바일: 푸터 숨김이므로 독 완전 하단 */
                left: 0 !important;
                top: unset !important;
                transform: none !important;
                /* PC의 숨김 상태(opacity:0, pointer-events:none) 리셋 */
                opacity: 1 !important;
                pointer-events: all !important;
                flex-direction: row !important;
                border-radius: 0;
                border-bottom: none;
                padding: 12px 12px 36px 12px;
                overflow-x: auto;
                overflow-y: visible;
                justify-content: flex-start;
                gap: 8px;
                z-index: 2000;
                align-items: center;
                -webkit-overflow-scrolling: touch;
                min-height: 80px;
                /* 독 슬라이드 애니메이션 */
                transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
            }
            /* 앱 활성화 시: 독 슬라이드 아웃 */
            body.mobile-app-active .mac-dock {
                transform: translateY(110%) !important;
                pointer-events: none;
            }
            /* 앱 활성화 시: 윈도우 전체 높이 활용 */
            body.mobile-app-active .mac-window {
                padding-bottom: 34px !important;
            }
            /* iOS 스타일 홈 인디케이터 */
            .mobile-home-indicator {
                display: none;
                position: fixed;
                bottom: 10px;
                left: 50%;
                transform: translateX(-50%);
                width: 120px;
                height: 5px;
                background: var(--text-main);
                opacity: 0.18;
                border-radius: 100px;
                z-index: 1800;
                pointer-events: none;
            }
            body.mobile-app-active .mobile-home-indicator {
                display: block;
            }
            /* 모바일: desktop-wrapper 좌측/우측 패딩 0 (독 없음) */
            .desktop-wrapper {
                height: 100dvh;
                overflow: hidden;
                padding-top: 56px !important;    /* 고정 헤더 높이만큼 오프셋 */
                padding-left: 0 !important;
                padding-right: 0 !important;
                padding-bottom: 88px !important; /* 모바일 하단 독 높이 */
                display: flex;
                flex-direction: column;
                box-sizing: border-box;
            }
            /* 모바일: home-content가 남은 세로 공간을 채우고 히어로를 중앙 배치 */
            .home-content {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                overflow: hidden;
            }
            body.app-active .desktop-wrapper {
                padding-left: 0 !important; /* 모바일에선 독 좌측 없음 */
            }
            body { overflow: hidden; }
            /* Admin: 타이틀바와 중복되는 mobile-header 숨김 */
            .admin-container .mobile-header { display: none !important; }
            .dock-icon { width: 48px; height: 48px; border-radius: 12px; }
            .dock-label { display: none !important; }
            /* Mobile text label below icon */
            .dock-item::after {
                content: attr(data-label);
                font-size: 10px;
                font-weight: 600;
                color: var(--text-main);
                margin-top: 5px;
                opacity: 0.75;
                white-space: nowrap;
                letter-spacing: -0.2px;
            }
            .dock-item.active::after { opacity: 1; font-weight: 800; }
            /* 마지막 아이콘이 스크롤 끝에서 잠기지 않도록 우측 여백 확보 (iOS에서 padding-right 대체) */
            .dock-item:last-child { margin-right: 32px; }
            /* 컨텐츠 영역 패딩 축소 */
            .mac-content-area { padding: 16px 16px; }
            /* 모바일: orbit 노드 숨김 */
            .orbit-layer { display: none !important; }
            /* 모바일: 브랜딩 중앙 정렬 — 좌측 오프셋 리셋 */
            .desktop-branding {
                left: auto !important;
                width: 100% !important;
                min-height: unset !important;   /* PC의 min-height:45dvh 해제 */
                padding: clamp(32px, 8vw, 56px) 24px clamp(24px, 6vw, 40px) !important;
                flex: 0 0 auto;
            }
            .home-content { width: 100% !important; overflow-x: hidden !important; }
            /* 모바일: dock-dot 복원 (수평 독에서 아이콘 아래에 표시) */
            .dock-dot { position: relative; right: unset; top: unset; transform: none; margin-top: 4px; }
            /* 모바일: footer 숨김 */
            .mac-footer { display: none !important; }
            /* 모바일: 스크롤바 완전 숨김 (수직 스크롤바 우측 + 하단 굵은 인디케이터 제거) */
            ::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
            * { scrollbar-width: none !important; -ms-overflow-style: none !important; }
        }

        /* ── Footer ────────────────────────────────────────────── */
        .mac-footer {
            position: fixed;
            bottom: 0;
            left: 0;    /* border-top 전체 폭 유지 */
            right: 0;
            z-index: 900;
            border-top: 1px solid var(--glass-border);
            padding: 14px 28px 14px 104px; /* 좌측 독(82px) + 22px 여백 */
            font-size: 13px;
            color: var(--text-muted);
            background: var(--bg-main);
        }
        .footer-inner {
            display: flex; align-items: center;

            border: 0;

            font-size: 15px;

            <div class="dock-dot"></div>

    <script src="js/layout.js"></script>
    <script>
        /* ── layout.js toggleTheme 브릿지: index.html 테마 로직과 연결 ── */
        window.toggleTheme = function() { toggleGlobalTheme(); };

        /* ── Nav Drawer (햄버거 메뉴) ──────────────────────────────── */
        function openNavDrawer() {
            document.getElementById('navDrawer').classList.add('open');
            document.getElementById('navDrawerOverlay').classList.add('open');
            document.getElementById('hamburgerBtn').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeNavDrawer() {
            document.getElementById('navDrawer').classList.remove('open');
            document.getElementById('navDrawerOverlay').classList.remove('open');
            document.getElementById('hamburgerBtn').classList.remove('open');
            document.body.style.overflow = '';
        }
        /* ESC 키로 드로어 닫기 */
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeNavDrawer();
        });

        /* ── macOS Magnetic Dock Effect ───────────────────────────── */
        (function () {
            const dock = document.getElementById('macDock');
            if (!dock) return;
            const MAX_SCALE = 1.5;   // max scale for hovered icon
            const SPREAD = 90;       // px radius of influence on neighbours

            function applyMagnetic(mouseY) {
                const items = dock.querySelectorAll('.dock-item');
                items.forEach(item => {
                    const icon = item.querySelector('.dock-icon');
                    if (!icon) return;
                    const rect = item.getBoundingClientRect();
                    const center = rect.top + rect.height / 2; // 수직 중심값
                    const dist = Math.abs(mouseY - center);
                    const ratio = Math.max(0, 1 - dist / SPREAD);
                    const scale = 1 + (MAX_SCALE - 1) * ratio;
                    // Scale ONLY the icon
                    icon.style.transform = `scale(${scale})`;
                });
            }

            function resetMagnetic() {
                dock.querySelectorAll('.dock-icon').forEach(icon => {
                    icon.style.transform = '';
                });
            }

            dock.addEventListener('mousemove', e => applyMagnetic(e.clientY));
            dock.addEventListener('mouseleave', resetMagnetic);
        })();

        function updateClock() {
            const now = new Date();
            const isMobile = window.innerWidth < 768;
            const options = isMobile
                ? { hour: '2-digit', minute: '2-digit', hour12: true }
                : { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true };
            document.getElementById('mac-clock').innerText = now.toLocaleString('en-US', options);
        }
        setInterval(updateClock, 1000); updateClock();

        function closeWindow() {
            if (window.closeApp) window.closeApp();
            document.getElementById('macWindow').classList.add('hidden');
            document.getElementById('desktopBranding').classList.remove('dimmed');
            document.getElementById('orbitLayer')?.classList.remove('dimmed');
            document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
            // 독 비활성화 + 모바일 독 복원
            document.body.classList.remove('app-active');
            document.body.classList.remove('mobile-app-active');
        }


        function toggleGlobalTheme() {
            const htmlEl = document.documentElement;
            const isDark = htmlEl.getAttribute('data-theme') === 'dark';
            const nextTheme = isDark ? 'light' : 'dark';
            htmlEl.setAttribute('data-theme', nextTheme);
            localStorage.setItem('vibe-theme', nextTheme);
            /* layout.js themeIcon 동기화 */
            const icon = document.getElementById('themeIcon');
            if (icon) icon.setAttribute('data-lucide', nextTheme === 'dark' ? 'sun' : 'moon');
            if (window.updateCanvasTheme) window.updateCanvasTheme(nextTheme);
            lucide.createIcons();
        }

        function contactAlert() {
            alert('✉️ Contact\n\n아직 준비 중입니다!\n빠른 시일 내에 연락처 페이지를 오픈할게요 :)');
        }

        // URL 파라미터 처리는 app-loader.js 로드 직후 즉시 실행으로 수행됨 (below)

        /* ── 공유하기 ───────────────────────────────────── */
        const APP_LABELS = {
            spell:   '맞춤법 검사',
            qr:      'QR Master',
            pdf:     'PDF Splitter',
            tangram: 'Tangram',
            pachinko:'Pachinko',
            server:  'Server Monitor',
            meter:   'Clap Meter',
            sys:     'System Info'
        };

        // 공유 팝오버 외부클릭 핸들러 (항상 확실하게 종료)
        var _shareOutsideHandler = null;

        function openSharePopover() {
            var pop = document.getElementById('sharePopover');
            if (!pop) return;

            // 팝오버를 먼저 표시
            pop.classList.add('open');

            // 버튼 바로 아래에 위치 계산
            var shareBtn = document.getElementById('windowShareBtn');
            if (shareBtn) {
                var r = shareBtn.getBoundingClientRect();
                pop.style.top   = (r.bottom + 8) + 'px';
                // 팝오버 우측 에지를 버튼 우측 에지에 정렬
                var rightOffset = window.innerWidth - r.right;
                // 모바일에서 팝오버가 화면 밖으로 나가지 않도록 치소값 보정
                pop.style.right = Math.max(6, rightOffset) + 'px';
            }

            // 데이터 채우기
            try {
                var app = window.currentApp || '';
                var url = location.origin + location.pathname + (app ? '?app=' + app : '');
                var urlEl = document.getElementById('sharePopoverUrl');
                if (urlEl) urlEl.textContent = url;

                var appLabel = 'Vibe Studio';
                try {
                    if (app && APP_LABELS && APP_LABELS[app]) appLabel = 'Vibe Studio - ' + APP_LABELS[app];
                } catch(e2) {}
                var nameEl = document.getElementById('sharePopoverAppName');
                if (nameEl) nameEl.textContent = appLabel;

                var copyTextEl = document.getElementById('shareCopyText');
                if (copyTextEl) copyTextEl.textContent = '링크 복사';
                var copyBtnEl = document.getElementById('sharePopoverCopyBtn');
                if (copyBtnEl) copyBtnEl.classList.remove('copied');
            } catch(e1) {}

            // 외부 클릭 시 닫기
            setTimeout(function() {
                _shareOutsideHandler = function(ev) {
                    var pop2 = document.getElementById('sharePopover');
                    var btn2 = document.getElementById('windowShareBtn');
                    if (pop2 && !pop2.contains(ev.target) && btn2 && !btn2.contains(ev.target)) {
                        closeSharePopover();
                    }
                };
                document.addEventListener('click', _shareOutsideHandler);
            }, 40);
        }

        function closeSharePopover() {
            const pop = document.getElementById('sharePopover');
            if (pop) pop.classList.remove('open');
            if (_shareOutsideHandler) {
                document.removeEventListener('click', _shareOutsideHandler);
                _shareOutsideHandler = null;
            }
            resetCopyBtn();
        }

        function toggleSharePopover(e) {
            e.stopPropagation();
            const pop = document.getElementById('sharePopover');
            if (pop.classList.contains('open')) {
                closeSharePopover();
            } else {
                openSharePopover();
            }
        }

        function copyShareLink() {
            var urlEl = document.getElementById('sharePopoverUrl');
            var url = urlEl ? urlEl.textContent : location.href;
            var done = function() {
                var btn = document.getElementById('sharePopoverCopyBtn');
                if (!btn) return;
                btn.classList.add('copied');
                var ct = document.getElementById('shareCopyText');
                if (ct) ct.textContent = '복사 완료! ✓';
                clearTimeout(btn._t);
                btn._t = setTimeout(function() { closeSharePopover(); }, 2000);
            };
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(done).catch(function() { fallbackCopy(url, done); });
            } else {
                fallbackCopy(url, done);
            }
        }

        function fallbackCopy(url, cb) {
            const ta = document.createElement('textarea');
            ta.value = url;
            ta.style.cssText = 'position:fixed;opacity:0;left:-9999px';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); cb(); } catch(err) {}
            document.body.removeChild(ta);
        }

        function resetCopyBtn() {
            var btn = document.getElementById('sharePopoverCopyBtn');
            if (!btn) return;
            btn.classList.remove('copied');
            var ct = document.getElementById('shareCopyText');
            if (ct) ct.textContent = '링크 복사';
        }
        window.addEventListener('resize', () => {
            // 레이아웃 리사이즈 시 필요한 처리
        });

        // 앱 설정 로드 후 독 버튼 표시/숨김 적용
        async function applyAppSettings() {
            try {
                const res  = await fetch('admin.php?action=app_settings_get', { cache: 'no-store' });
                const data = await res.json();
                if (!data.success || !data.settings.length) return;
                data.settings.forEach(s => {
                    const display = parseInt(s.enabled) === 0 ? 'none' : '';
                    // 독 버튼
                    const btn = document.querySelector(`.dock-item[data-app-key="${s.app_key}"]`);
                    if (btn) btn.style.display = display;
                    // 홈 카드
                    const card = document.querySelector(`.app-home-card[data-app-key="${s.app_key}"]`);
                    if (card) card.style.display = display;
                });
            } catch (e) { /* 설정 로드 실패 시 모두 표시 유지 */ }
        }

        // 외부에서 독 버튼 상태 갱신 (관리자 패널 토글 시 즉시 반영)
        window.refreshDockVisibility = applyAppSettings;
    </script>
    <script src="js/vibe-background.js?v=20260316"></script>
    <script src="js/app-loader.js?v=20260318"></script>

    <!-- URL 파라미터 처리: app-loader.js 로드 직후 즉시 실행 -->
    <!-- openAdmin / switchApp은 app-loader.js가 동기 실행되므로 이미 정의됨 -->
    <script>
    (function() {
        var params = new URLSearchParams(location.search);

        /* ?admin=1: 관리자 패널 직접 오픈 */
        if (params.get('admin') === '1') {
            window.openAdmin();
            return; // 앱 파라미터와 중복 실행 방지
        }

        /* ?app=appname: 특정 앱 직접 진입 */
        var appParam = params.get('app');
        if (appParam) {
            var appMap = {
                spell:    ['Spell Check',    '#a78bfa', 'languages'],
                qr:       ['QR Master',       '#007aff', 'qr-code'],
                pdf:      ['PDF Splitter',    '#ff3b30', 'scissors'],
                tangram:  ['Tangram',          '#ff6b35', 'puzzle'],
                pachinko: ['Pachinko v5.1',   '#ff2d55', 'gamepad-2'],
                server:   ['Server Monitor',  '#34d399', 'server'],
                meter:    ['Clap Meter',       '#ff9500', 'mic'],
                sys:      ['System Info',      '#7b78ff', 'activity']
            };
            var info = appMap[appParam];
            if (info) window.switchApp(appParam, info[0], info[1], info[2]);
        }

        /* 앱 표시 설정 적용 */
        applyAppSettings();
    })();
    </script>

    <!-- Share Popover -->
    <div class="share-popover" id="sharePopover" role="dialog" aria-label="앱 링크 공유">
        <div class="share-popover-header">

            앱 링크 공유
        </div>
        <p class="share-popover-app-name" id="sharePopoverAppName">Vibe Studio</p>
        <div class="share-popover-url-row">
            <span id="sharePopoverUrl"></span>
        </div>
        <button class="share-popover-copy" id="sharePopoverCopyBtn" onclick="copyShareLink()">
            <i data-lucide="copy" style="width:14px;height:14px;flex-shrink:0;"></i>
            <span id="shareCopyText">링크 복사</span>
        </button>
    </div>
