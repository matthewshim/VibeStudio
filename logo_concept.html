* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #060010; color: #f5f5f7; font-family: 'Inter', sans-serif; }
.preview { padding: 60px 40px; }
.preview-title { text-align:center; font-size:11px; font-weight:700; letter-spacing:2.5px;

.preview-desc { text-align:center; color:rgba(255,255,255,.4); font-size:12px; margin-bottom:48px; }

.size-cell { display:flex; flex-direction:column; align-items:center; gap:12px; }
.size-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,.3); }
.divider { height:1px; background:rgba(255,255,255,.07); margin:8px 0 48px; }
.nav-mock { display:flex; align-items:center; justify-content:space-between;
  background:rgba(8,6,18,.92); border:1px solid rgba(255,255,255,.09);
  border-radius:14px; padding:12px 22px; max-width:480px; margin:0 auto 32px; }
.nav-brand { display:flex; align-items:center; gap:9px; font-weight:800; font-size:15px; }
.nav-links { display:flex; gap:18px; font-size:12px; color:rgba(255,255,255,.38); }

/* light theme nav preview */
.nav-mock-light { background:rgba(245,245,247,.96); border:1px solid rgba(0,0,0,.1);
  border-radius:14px; padding:12px 22px; max-width:480px; margin:0 auto 32px; }
.nav-brand-dark { display:flex; align-items:center; gap:9px; font-weight:800; font-size:15px; color:#18181b; }
.nav-links-dark { display:flex; gap:18px; font-size:12px; color:rgba(0,0,0,.38); }

.panel-mock { background:rgba(14,6,30,.96); border:1px solid rgba(168,85,247,.15);
  border-radius:20px; padding:30px 22px; width:250px; text-align:center; margin:0 auto; }
.panel-badge { display:inline-block; font-size:9px; font-weight:800; letter-spacing:2.5px;
  text-transform:uppercase; color:#a855f7; background:rgba(168,85,247,.1);
  border:1px solid rgba(168,85,247,.22); border-radius:100px; padding:4px 14px; margin:10px 0 14px; }
.panel-title { font-size:21px; font-weight:900; line-height:1.2; }
.panel-title span { color:#c084fc; }
.panel-desc { font-size:12px; color:rgba(255,255,255,.4); margin:8px 0 18px; line-height:1.6; }
.panel-btn { width:100%; padding:13px; border-radius:12px; border:none;
  background:linear-gradient(135deg,#a855f7,#d946ef); color:white; font-size:14px; font-weight:700; cursor:pointer; }
